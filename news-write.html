<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>게시글 작성 | 왕가부동산</title>
<meta name="robots" content="noindex, nofollow"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fff8f1;
            font-size: 15px;
        }
        input, textarea, button, a { min-height: 44px; }
</style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#F9F9F9", "background": "#fff8f1", "error": "#ba1a1a",
                        "canvas": "#FFFFFF", "muted": "#666666", "ink": "#151515",
                        "on-surface": "#1f1b10", "divider": "#AAAAAA", "primary": "#745b00",
                        "primary-container": "#ffcc00", "on-primary": "#ffffff"
                    },
                    "spacing": { "md": "16px", "xl": "32px", "section": "64px", "lg": "24px", "base": "20px", "sm": "8px", "xs": "4px" },
                    "fontFamily": { "body-main": ["Noto Sans KR"], "headline-section": ["Plus Jakarta Sans"] }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen">
<header class="w-full sticky top-0 z-50 bg-surface border-b border-divider shadow-sm">
<div class="max-w-3xl mx-auto px-lg flex justify-between items-center h-16">
<a href="index.html" class="text-headline-section font-headline-section font-bold text-primary">왕가부동산</a>
<a href="admin.html" class="text-on-surface-variant hover:text-primary transition-colors font-body-main">관리자 대시보드</a>
</div>
</header>
<main class="max-w-3xl mx-auto px-lg py-section pb-xxl">
<h1 id="page-title" class="font-headline-section text-2xl font-bold text-ink mb-xl">새 글 작성</h1>
<form id="post-form" class="bg-canvas rounded-xl shadow-sm border border-divider/20 p-lg md:p-xl flex flex-col gap-lg">
<div>
<label class="block font-bold text-ink mb-xs" for="title">제목</label>
<input id="title" name="title" type="text" required class="w-full px-md py-sm rounded-lg border border-divider focus:outline-none focus:ring-2 focus:ring-primary">
</div>
<div class="flex flex-col sm:flex-row gap-lg">
<div class="flex-1">
<label class="block font-bold text-ink mb-xs" for="category">카테고리</label>
<input id="category" name="category" type="text" required class="w-full px-md py-sm rounded-lg border border-divider focus:outline-none focus:ring-2 focus:ring-primary" placeholder="예: 부동산 뉴스">
</div>
<div class="flex-1">
<label class="block font-bold text-ink mb-xs" for="date">작성일</label>
<input id="date" name="date" type="date" required class="w-full px-md py-sm rounded-lg border border-divider focus:outline-none focus:ring-2 focus:ring-primary">
</div>
</div>
<div>
<label class="block font-bold text-ink mb-xs" for="content">본문 (마크다운)</label>
<textarea id="content" name="content" required rows="16" class="w-full px-md py-sm rounded-lg border border-divider focus:outline-none focus:ring-2 focus:ring-primary font-mono text-sm" placeholder="## 소제목&#10;&#10;본문 내용을 마크다운으로 작성하세요."></textarea>
</div>
<div id="form-error" class="hidden text-error text-sm"></div>
<div class="flex gap-md">
<button type="submit" id="submit-btn" class="px-xl py-md rounded-lg bg-primary-container text-on-surface font-bold">저장</button>
<a href="admin.html" class="px-xl py-md rounded-lg border border-divider text-ink font-bold flex items-center justify-center">취소</a>
</div>
</form>
</main>
<script src="db.js"></script>
<script>
requireAdmin();

function getIdFromUrl() {
  return new URLSearchParams(window.location.search).get('id');
}

const editId = getIdFromUrl();

(async function init() {
  if (editId) {
    document.getElementById('page-title').textContent = '게시글 수정';
    try {
      const post = await getPost(editId);
      if (post) {
        document.getElementById('title').value = post.title || '';
        document.getElementById('category').value = post.category || '';
        document.getElementById('date').value = post.date || '';
        document.getElementById('content').value = post.content || '';
      }
    } catch (e) {
      showError('게시글을 불러오지 못했습니다: ' + e.message);
    }
  } else {
    document.getElementById('date').value = new Date().toISOString().slice(0, 10);
  }
})();

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

document.getElementById('post-form').addEventListener('submit', async function (e) {
  e.preventDefault();
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = '저장 중...';
  const payload = {
    title: document.getElementById('title').value.trim(),
    category: document.getElementById('category').value.trim(),
    date: document.getElementById('date').value,
    content: document.getElementById('content').value
  };
  try {
    if (editId) {
      await updatePost(editId, payload);
      window.location.href = 'news-detail.html?id=' + encodeURIComponent(editId);
    } else {
      const created = await savePost(payload);
      window.location.href = 'news-detail.html?id=' + encodeURIComponent(created.id);
    }
  } catch (e) {
    showError('저장 실패: ' + e.message);
    submitBtn.disabled = false;
    submitBtn.textContent = '저장';
  }
});
</script>
</body>
</html>
